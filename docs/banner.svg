<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Pixel grid decoration - left side -->
  <g opacity="0.15" fill="#3b82f6">
    <rect x="20" y="30" width="6" height="6"/>
    <rect x="30" y="30" width="6" height="6"/>
    <rect x="20" y="40" width="6" height="6"/>
    <rect x="40" y="20" width="6" height="6"/>
    <rect x="50" y="30" width="6" height="6"/>
    <rect x="30" y="50" width="6" height="6"/>
    <rect x="20" y="60" width="6" height="6"/>
    <rect x="40" y="40" width="6" height="6"/>
    <rect x="60" y="20" width="6" height="6"/>

    <rect x="20" y="130" width="6" height="6"/>
    <rect x="30" y="140" width="6" height="6"/>
    <rect x="20" y="150" width="6" height="6"/>
    <rect x="40" y="160" width="6" height="6"/>
    <rect x="50" y="140" width="6" height="6"/>
    <rect x="30" y="160" width="6" height="6"/>
  </g>

  <!-- Pixel grid decoration - right side -->
  <g opacity="0.15" fill="#3b82f6">
    <rect x="720" y="30" width="6" height="6"/>
    <rect x="730" y="40" width="6" height="6"/>
    <rect x="740" y="30" width="6" height="6"/>
    <rect x="750" y="20" width="6" height="6"/>
    <rect x="760" y="30" width="6" height="6"/>
    <rect x="730" y="50" width="6" height="6"/>
    <rect x="750" y="40" width="6" height="6"/>

    <rect x="720" y="140" width="6" height="6"/>
    <rect x="740" y="150" width="6" height="6"/>
    <rect x="730" y="160" width="6" height="6"/>
    <rect x="760" y="140" width="6" height="6"/>
    <rect x="750" y="160" width="6" height="6"/>
  </g>

  <!-- Pixel terminal icon -->
  <g transform="translate(295, 45)">
    <!-- Terminal body -->
    <rect x="0" y="0" width="48" height="36" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Title bar dots -->
    <circle cx="8" cy="7" r="2" fill="#ef4444" opacity="0.8"/>
    <circle cx="15" cy="7" r="2" fill="#eab308" opacity="0.8"/>
    <circle cx="22" cy="7" r="2" fill="#22c55e" opacity="0.8"/>
    <!-- Cursor blink -->
    <rect x="8" y="16" width="12" height="2" fill="#3b82f6">
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="22" width="20" height="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="8" y="28" width="8" height="2" fill="#3b82f6" opacity="0.2"/>
    <!-- Pixel base -->
    <rect x="12" y="38" width="24" height="4" rx="1" fill="#1e293b"/>
    <rect x="18" y="42" width="12" height="3" rx="1" fill="#1e293b"/>
  </g>

  <!-- MaxOS text - pixel-styled -->
  <text x="400" y="125" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="4">MaxOS</text>

  <!-- Tagline -->
  <text x="400" y="155" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#94a3b8" letter-spacing="1.5">your AI, always on</text>

  <!-- Subtle blue glow line -->
  <rect x="300" y="170" width="200" height="1" fill="#3b82f6" opacity="0.3" rx="1"/>
</svg>
